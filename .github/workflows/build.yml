name: Build ImmortalWrt

on:
  # push:
    # branches:
    #   - mt798x-mt799x-6.6-mtwifi # 当推送到该分支时触发
    # paths-ignore:
    #   - '**.md' # 忽略 markdown 文档的修改
    #   - 'LICENSE'
  workflow_dispatch: # 允许手动在网页触发

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
      - name: Checkout My Repository Source
        uses: actions/checkout@v4
        with:
          ref: mt798x-mt799x-6.6-mtwifi # 指定要检出的分支
          fetch-depth: 0 # 获取完整历史，方便某些脚本获取版本号（可选）

      - name: Initialize Build Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 清理磁盘空间以容纳编译过程
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          
          # 安装 OpenWrt/ImmortalWrt 构建所需依赖
          # 这里列出了核心依赖，如果编译报错缺少特定库，可在此添加
          sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/openwrt/packages/master/scripts/dl_github_archive.sh | grep -oP '(?<=apt-get install ).*?(?= \|)' || echo "build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils python3-setuptools python3-dev rsync subversion swig time zlib1g-dev file findutils")
          
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "Asia/Shanghai"
          
          # 设置 Git 用户信息
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Update and Install Feeds
        run: |
          # 当前目录已经是源码根目录
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Configuration (mt7987_mt7992)
        run: |
          # 检查配置文件是否存在
          if [ -f "defconfig/mt7987_mt7992.config" ]; then
            cp -f defconfig/mt7987_mt7992.config .config
            echo "✅ Successfully loaded defconfig/mt7987_mt7992.config"
            
            # 执行 make defconfig 以确保配置完整并处理依赖
            # make defconfig
            
            # 显示最终配置的关键部分（可选，用于调试）
            # grep CONFIG_TARGET_DEVICE .config
          else
            echo "❌ Error: defconfig/mt7987_mt7992.config not found in defconfig/ directory!"
            ls -R defconfig/
            exit 1
          fi

      - name: Compile Firmware
        run: |
          # 开始编译
          # -j$(nproc) 使用所有可用 CPU 核心
          # V=s 输出详细日志以便排查错误
          make -j$(nproc) V=s 2>&1 | tee build.log

      - name: Create a release
        uses: ncipollo/release-action@v1
        with:
          makeLatest: true
          tag: mt7987_mt7992-tenda-be12pro-${{ github.run_number }}
          artifacts: bin/targets/mediatek/filogic/*
          body: |
            **Build Details:**
            - **Source:** My Repository (${{ github.repository }})
            - **Branch:** mt798x-mt799x-6.6-mtwifi
            - **Config:** mt7987_mt7992.config
            - **Commit:** ${{ github.sha }}
          # token: ${{ secrets.GITHUB_TOKEN }}



      - name: Upload Logs (If Failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-build-logs
          path: build.log
