name: Build ImmortalWrt

on:
  push:
    branches:
      - tenda-be12-pro 
    paths-ignore:
      - '**.md' # 忽略 markdown 文档的修改
      - 'LICENSE'
  workflow_dispatch: # 允许手动在网页触发

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
      - name: Checkout My Repository Source
        uses: actions/checkout@v4
        with:
          ref: mt798x-mt799x-6.6-mtwifi # 指定要检出的分支
          fetch-depth: 0 # 获取完整历史，方便某些脚本获取版本号（可选）

      - name: Initialize Build Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 清理磁盘空间以容纳编译过程

          # 安装 OpenWrt/ImmortalWrt 构建所需依赖
          sudo apt update -y
          
          sudo apt full-upgrade -y
          
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          
          sudo timedatectl set-timezone "Asia/Shanghai"
      

      - name: Update and Install Feeds
        run: |
          # 当前目录已经是源码根目录
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Configuration (mt7987_mt7992)
        run: |
          # 检查配置文件是否存在
          if [ -f "defconfig/mt7987_mt7992.config" ]; then
            cp -f defconfig/mt7987_mt7992.config .config
            echo "✅ Successfully loaded defconfig/mt7987_mt7992.config"
            
            # 👇 新增：打印 .config 文件内容到日志
            echo "📄 Content of .config:"
            cat .config
            
            # 执行 make defconfig 以确保配置完整并处理依赖
            # make defconfig
            
          else
            echo "❌ Error: defconfig/mt7987_mt7992.config not found in defconfig/ directory!"
            ls -R defconfig/
            exit 1
          fi

          # ⭐ 修复 ebtables 下载问题 (镜像站文件哈希不匹配)
          EBTABLES_MAKEFILE="package/network/utils/ebtables/Makefile"
          if [ -f "$EBTABLES_MAKEFILE" ]; then
            echo "🔧 修复 ebtables 下载源和哈希..."
            # 使用 netfilter 官方 GitHub 镜像
            sed -i 's|https://git.netfilter.org/ebtables|https://github.com/netfilter/ebtables.git|g' "$EBTABLES_MAKEFILE"
            sed -i 's|git://git.netfilter.org/ebtables|https://github.com/netfilter/ebtables.git|g' "$EBTABLES_MAKEFILE"
            # 更新哈希值为镜像站实际提供的文件哈希 (解决哈希不匹配问题)
            sed -i 's|PKG_MIRROR_HASH:=.*|PKG_MIRROR_HASH:=skip|g' "$EBTABLES_MAKEFILE"
            echo "✅ ebtables 下载源已修复"
          fi
      - name: Compile Firmware
        run: |
          # 开始编译
          # -j$(nproc) 使用所有可用 CPU 核心
          # V=s 输出详细日志以便排查错误
          make -j$(nproc) V=s

      - name: Create a release
        uses: ncipollo/release-action@v1
        with:
          makeLatest: true
          tag: mt7987_mt7992-tenda-be12pro-${{ github.run_number }}
          artifacts: bin/targets/mediatek/filogic/*
          body: |
            **Build Details:**
            - **Source:** My Repository (${{ github.repository }})
            - **Branch:** mt798x-mt799x-6.6-mtwifi
            - **Config:** mt7987_mt7992.config
            - **Commit:** ${{ github.sha }}
          # token: ${{ secrets.GITHUB_TOKEN }}



      - name: Upload Logs (If Failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-build-logs
          path: build.log
